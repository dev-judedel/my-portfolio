<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jude Dela Cruz — Full Stack Developer</title>
  <meta http-equiv="refresh" content="5;url=https://judedelacruz.vercel.app" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080a0e;
      --surface: #0d1117;
      --border:  rgba(255,255,255,0.07);
      --fg:      #f0ece4;
      --fg-2:    #9a9690;
      --fg-3:    #5a5754;
      --gold:    #c9a84c;
      --gold-2:  #e8c97a;
      --green:   #3ddc84;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* ── Grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.6;
    }

    /* ── Radial glow ── */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Grid lines ── */
    .grid-lines {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Main layout ── */
    .stage {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 0;
    }

    /* ── Top label ── */
    .label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .label::before, .label::after {
      content: '';
      width: 32px;
      height: 1px;
      background: var(--gold);
      opacity: 0.5;
    }

    /* ── Name ── */
    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 9vw, 110px);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 0.9;
      color: var(--fg);
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
      position: relative;
    }
    .name em {
      font-style: italic;
      color: var(--gold-2);
    }

    /* ── Divider ── */
    .divider {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, transparent, var(--border), transparent);
      margin: 28px 0;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.6s;
    }

    /* ── Role ── */
    .role {
      font-family: 'DM Mono', monospace;
      font-size: clamp(11px, 1.4vw, 13px);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--fg-2);
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.7s;
    }

    /* ── Stats row ── */
    .stats {
      display: flex;
      align-items: center;
      gap: 0;
      margin: 36px 0;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.85s;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .stat {
      padding: 14px 28px;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .stat:last-child { border-right: none; }
    .stat-val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 500;
      color: var(--gold-2);
      line-height: 1;
    }
    .stat-lbl {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--fg-3);
      margin-top: 5px;
    }

    /* ── CTA button ── */
    .cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 36px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--gold);
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 1s;
    }
    .cta:hover {
      background: var(--gold-2);
      transform: translateY(-1px);
    }
    .cta-arrow {
      display: inline-block;
      transition: transform 0.2s;
    }
    .cta:hover .cta-arrow { transform: translateX(4px); }

    /* ── Countdown ── */
    .countdown-wrap {
      margin-top: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 1.1s;
    }
    .countdown-text {
      font-size: 11px;
      color: var(--fg-3);
      letter-spacing: 0.1em;
    }
    .countdown-bar-bg {
      width: 100px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .countdown-bar {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      animation: drain 5s linear forwards 0s;
      transform-origin: left;
    }
    .countdown-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      color: var(--gold);
      min-width: 16px;
      text-align: right;
    }

    /* ── Available badge ── */
    .avail {
      position: fixed;
      top: 28px;
      right: 28px;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--fg-2);
      border: 1px solid var(--border);
      padding: 7px 14px;
      border-radius: 2px;
      opacity: 0;
      animation: fadeIn 0.6s ease forwards 1.3s;
      background: rgba(13,17,23,0.7);
      backdrop-filter: blur(8px);
    }
    .avail-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    /* ── Year stamp ── */
    .year-stamp {
      position: fixed;
      bottom: 28px;
      left: 28px;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--fg-3);
      opacity: 0;
      animation: fadeIn 0.6s ease forwards 1.4s;
    }

    /* ── Socials ── */
    .socials {
      position: fixed;
      bottom: 28px;
      right: 28px;
      display: flex;
      gap: 16px;
      opacity: 0;
      animation: fadeIn 0.6s ease forwards 1.4s;
    }
    .social-link {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--fg-3);
      text-decoration: none;
      transition: color 0.2s;
    }
    .social-link:hover { color: var(--gold); }

    /* ── Keyframes ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(61,220,132,0.4); }
      50%       { opacity: 0.7; box-shadow: 0 0 0 4px rgba(61,220,132,0); }
    }
    @keyframes drain {
      from { width: 100%; }
      to   { width: 0%; }
    }

    @media (max-width: 480px) {
      .stats { flex-direction: column; }
      .stat  { border-right: none; border-bottom: 1px solid var(--border); }
      .stat:last-child { border-bottom: none; }
      .avail { top: 16px; right: 16px; }
      .socials, .year-stamp { bottom: 16px; }
      .year-stamp { left: 16px; }
      .socials { right: 16px; }
    }
  </style>
</head>
<body>

  <div class="grid-lines"></div>

  <!-- Available badge -->
  <div class="avail">
    <span class="avail-dot"></span>
    Available for work
  </div>

  <!-- Year stamp -->
  <div class="year-stamp">© 2025 — 2026</div>

  <!-- Socials -->
  <div class="socials">
    <a href="https://github.com/dev-judedel" target="_blank" class="social-link">GitHub</a>
    <a href="https://www.linkedin.com/in/jude-delacruz/" target="_blank" class="social-link">LinkedIn</a>
  </div>

  <!-- Main -->
  <div class="stage">

    <div class="label">Portfolio</div>

    <h1 class="name">Jude <em>Dela Cruz</em></h1>

    <div class="divider"></div>

    <p class="role">Full Stack Developer &nbsp;·&nbsp; Python &nbsp;·&nbsp; PHP &nbsp;·&nbsp; Enterprise Systems</p>

    <div class="stats">
      <div class="stat">
        <div class="stat-val">8+</div>
        <div class="stat-lbl">Years Exp.</div>
      </div>
      <div class="stat">
        <div class="stat-val">4+</div>
        <div class="stat-lbl">Systems Built</div>
      </div>
      <div class="stat">
        <div class="stat-val">2×</div>
        <div class="stat-lbl">Company Award</div>
      </div>
    </div>

    <a href="https://judedelacruz.vercel.app" class="cta">
      Enter Portfolio <span class="cta-arrow">→</span>
    </a>

    <div class="countdown-wrap">
      <span class="countdown-text">Redirecting in</span>
      <div class="countdown-bar-bg">
        <div class="countdown-bar"></div>
      </div>
      <span class="countdown-num" id="num">5</span>
    </div>

  </div>

  <script>
    // Countdown
    let t = 5;
    const el = document.getElementById('num');
    const iv = setInterval(() => {
      t--;
      el.textContent = t;
      if (t <= 0) {
        clearInterval(iv);
        window.location.href = 'https://judedelacruz.vercel.app';
      }
    }, 1000);
  </script>
</body>
</html>
